name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  AWS_REGION: us-east-1

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install auth-service dependencies
        run: |
          cd services/auth-service
          pip install -r requirements.txt

      - name: Install payment-service dependencies
        run: |
          cd services/payment-service
          pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check services/

      - name: Type check with mypy
        run: |
          pip install mypy
          mypy services/auth-service/src services/payment-service/src --ignore-missing-imports

      - name: Run unit tests
        run: |
          pip install pytest pytest-cov
          pytest services/ -v --cov=services --cov-report=xml

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive terraform/

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: terraform/

      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform/

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Bandit (Python SAST)
        run: |
          pip install bandit
          bandit -r services/ -ll -f json -o bandit-report.json || true

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: bandit-report.json

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-and-test]

    strategy:
      matrix:
        service: [auth-service, payment-service, document-service]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -t novapay/${{ matrix.service }}:${{ github.sha }} \
            services/${{ matrix.service }}/

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: novapay/${{ matrix.service }}:${{ github.sha }}
          format: table
          exit-code: 0
